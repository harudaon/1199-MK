<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Simulation Game PRO V3</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Nunito', 'Plus Jakarta Sans', '-apple-system', 'sans-serif'],

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Nunito', 'Plus Jakarta Sans', -apple-system, sans-serif;
      font-weight: 800;
      background-color: #0A0E1A;
    }

    @keyframes customBlink {
      0%, 100% { opacity: 1; transform: scale(1); filter: brightness(1.2); }
      50% { opacity: 0.3; transform: scale(0.97); filter: brightness(0.8); }
    }
    .animate-custom-blink {
      animation: customBlink 1.2s infinite ease-in-out;
    }

    @keyframes neonPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(99, 102, 241, 0.4); border-color: rgba(99, 102, 241, 0.6); }
      50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.8); border-color: rgba(99, 102, 241, 1); }
    }
    .pulse-indigo-glowing { animation: neonPulse 1.5s infinite ease-in-out; }

    @keyframes cyanPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(6, 182, 212, 0.4); border-color: rgba(6, 182, 212, 0.6); }
      50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.8); border-color: rgba(6, 182, 212, 1); }
    }
    .pulse-cyan-glowing { animation: cyanPulse 1.5s infinite ease-in-out; }

    @keyframes emeraldPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6); }
      50% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.8); border-color: rgba(16, 185, 129, 1); }
    }
    .pulse-emerald-glowing { animation: emeraldPulse 1.5s infinite ease-in-out; }

    * { -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="min-h-screen text-[#E2E8F0] select-none pb-safe">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const gun = Gun([
      'https://gun-manhattan.herokuapp.com/gun',
      'https://peer.wall.org/gun'
    ]);

    const MASTER_LIST_KEY = 'market_sim_pro_v3_master_list_v4';

    const ShieldIcon = () => ( <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg> );
    const UsersIcon = () => ( <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg> );
    const LockIcon = () => ( <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg> );
    const ClockIcon = ({ className }) => ( <svg className={`w-4 h-4 ${className}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> );
    const PlayIcon = () => ( <svg className="w-3.5 h-3.5 mr-1" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z" /></svg> );
    const SquareIcon = () => ( <svg className="w-3.5 h-3.5 mr-1" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 6h12v12H6z" /></svg> );
    const AwardIcon = () => ( <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg> );
    const CheckCircleIcon = ({ className = "w-4 h-4" }) => ( <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> );
    const ChevronLeftIcon = () => ( <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg> );
    const ChevronRightIcon = () => ( <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg> );
    const DownloadIcon = () => ( <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg> );
    const EditIcon = () => ( <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg> );
    const AlertIcon = () => ( <svg className="w-5 h-5 text-amber-400 mr-2 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg> );

    const MARKET_STAGES = {
      1: { name: "초기 시장 (R1~3)", rules: "최고 단독 +120, 최고 동점 +60 / 최저 단독 -60, 최저 동점 -30", color: "border-cyan-500/80 text-cyan-400 bg-cyan-950/40", hex: "#06B6D4" },
      2: { name: "초기 시장 (R1~3)", rules: "최고 단독 +120, 최고 동점 +60 / 최저 단독 -60, 최저 동점 -30", color: "border-cyan-500/80 text-cyan-400 bg-cyan-950/40", hex: "#06B6D4" },
      3: { name: "초기 시장 (R1~3)", rules: "최고 단독 +120, 최고 동점 +60 / 최저 단독 -60, 최저 동점 -30", color: "border-cyan-500/80 text-cyan-400 bg-cyan-950/40", hex: "#06B6D4" },
      4: { name: "완전경쟁 시장 (R4~6)", rules: "최고 단독 +120, 최고 동점 0 / 최저 단독 -80, 최저 동점 0", color: "border-emerald-500/80 text-emerald-400 bg-emerald-950/40", hex: "#10B981" },
      5: { name: "완전경쟁 시장 (R4~6)", rules: "최고 단독 +120, 최고 동점 0 / 최저 단독 -80, 최저 동점 0", color: "border-emerald-500/80 text-emerald-400 bg-emerald-950/40", hex: "#10B981" },
      6: { name: "완전경쟁 시장 (R4~6)", rules: "최고 단독 +120, 최고 동점 0 / 최저 단독 -80, 최저 동점 0", color: "border-emerald-500/80 text-emerald-400 bg-emerald-950/40", hex: "#10B981" },
      7: { name: "독점 시장 (R7~9)", rules: "최고 단독 +180 (동점 시 차순위 단독팀) / 최저 -120 / 중간 -40", color: "border-violet-500/80 text-violet-400 bg-violet-950/40", hex: "#8B5CF6" },
      8: { name: "독점 시장 (R7~9)", rules: "최고 단독 +180 (동점 시 차순위 단독팀) / 최저 -120 / 중간 -40", color: "border-violet-500/80 text-violet-400 bg-violet-950/40", hex: "#8B5CF6" },
      9: { name: "독점 시장 (R7~9)", rules: "최고 단독 +180 (동점 시 차순위 단독팀) / 최저 -120 / 중간 -40", color: "border-violet-500/80 text-violet-400 bg-violet-950/40", hex: "#8B5CF6" }
    };

    const createInitialDeck = () => {
      const deck = [];
      for (let val = 1; val <= 9; val++) {
        deck.push({ id: `red-${val}-1`, value: val, color: 'red' });
        deck.push({ id: `black-${val}-2`, value: val, color: 'black' });
      }
      return deck;
    };

    const generateGameCode = () => {
      const nums = '0123456789';
      let code = 'MK';
      for (let i = 0; i < 4; i++) {
        code += nums.charAt(Math.floor(Math.random() * nums.length));
      }
      return code;
    };

    const runScoringAlgorithm = (round, teams) => {
      const scores = {};
      const submissions = teams.map(team => {
        const hist = team.history[round];
        if (!hist || !hist.cards || hist.cards.length < 2) {
          return { teamId: team.id, sum: 0, valid: false };
        }
        const sum = hist.cards[0].value + hist.cards[1].value;
        return { teamId: team.id, sum, valid: true };
      });

      const validSubmissions = submissions.filter(s => s.valid);
      if (validSubmissions.length === 0) {
        teams.forEach(t => { scores[t.id] = 0; });
        return scores;
      }

      const sums = validSubmissions.map(s => s.sum);
      const maxSum = Math.max(...sums);
      const minSum = Math.min(...sums);
      const maxTeams = validSubmissions.filter(s => s.sum === maxSum);
      const minTeams = validSubmissions.filter(s => s.sum === minSum);

      if (round >= 1 && round <= 3) {
        validSubmissions.forEach(sub => {
          let earned = 0;
          if (sub.sum === maxSum) earned = maxTeams.length === 1 ? 120 : 60;
          else if (sub.sum === minSum) earned = minTeams.length === 1 ? -60 : -30;
          scores[sub.teamId] = earned;
        });
      } else if (round >= 4 && round <= 6) {
        validSubmissions.forEach(sub => {
          let earned = 0;
          if (sub.sum === maxSum) earned = maxTeams.length === 1 ? 120 : 0;
          else if (sub.sum === minSum) earned = minTeams.length === 1 ? -80 : 0;
          scores[sub.teamId] = earned;
        });
      } else if (round >= 7 && round <= 9) {
        let winnerId = null;
        if (maxTeams.length === 1) {
          winnerId = maxTeams[0].teamId;
        } else {
          const sortedUniqueSums = [...new Set(sums)].sort((a, b) => b - a);
          for (const currentSum of sortedUniqueSums) {
            const matchingTeams = validSubmissions.filter(s => s.sum === currentSum);
            if (matchingTeams.length === 1) {
              winnerId = matchingTeams[0].teamId;
              break;
            }
          }
        }
        validSubmissions.forEach(sub => {
          let earned = -40;
          if (sub.teamId === winnerId) earned = 180;
          else if (sub.sum === minSum) earned = -120;
          scores[sub.teamId] = earned;
        });
      }

      submissions.forEach(sub => {
        if (!sub.valid) scores[sub.teamId] = -100;
      });

      return scores;
    };

    function App() {
      const [gameState, setGameState] = useState({
        gameCode: '',
        courseName: '',
        isStarted: false,
        currentRound: 1,
        teams: [],
        status: 'idle', 
        timer: 180,
        timerActive: false,
      });

      const [userRole, setUserRole] = useState('landing'); 
      const [selectedTeamId, setSelectedTeamId] = useState('');
      const [adminPassword, setAdminPassword] = useState('');
      const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
      const [joinGameCode, setJoinGameCode] = useState('');
      
      // Admin Dashboard States
      const [adminSessions, setAdminSessions] = useState({});
      const [isCreateGameModalOpen, setIsCreateGameModalOpen] = useState(false);
      const [newCourseName, setNewCourseName] = useState('');
      const [newTeamCount, setNewTeamCount] = useState(4);
      
      const [toast, setToast] = useState(null);
      const [selectedCards, setSelectedCards] = useState([]);
      const [editingScoreTeamId, setEditingScoreTeamId] = useState(null);
      const [editScoreValue, setEditScoreValue] = useState('');
      const [showRoundResultPopup, setShowRoundResultPopup] = useState(false);

      const [confirmModal, setConfirmModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        onConfirm: null
      });

      useEffect(() => {
        if (userRole === 'admin_dashboard') {
          const listRef = gun.get(MASTER_LIST_KEY);
          const handler = (data, key) => {
            setAdminSessions(prev => {
              const next = { ...prev };
              if (data && data !== "null") {
                try {
                   next[key] = JSON.parse(data);
                } catch(e) {}
              } else {
                delete next[key];
              }
              return next;
            });
          };
          listRef.map().on(handler);
        }
      }, [userRole]);

      useEffect(() => {
        if (!gameState.gameCode) return;

        const globalStateRef = gun.get('market_sim_pro_v3_session_' + gameState.gameCode).get('global_state');
        
        globalStateRef.on((data) => {
          if (data && data !== "null") {
            try {
              const parsed = JSON.parse(data);
              setGameState(prev => ({ ...prev, ...parsed }));
            } catch (err) {}
          }
        });

        const timerRef = gun.get('market_sim_pro_v3_session_' + gameState.gameCode).get('timer_sync');
        timerRef.on((data) => {
          if (data && data !== "null") {
            try {
              const syncTimerObj = JSON.parse(data);
              setGameState(prev => ({
                ...prev,
                timer: syncTimerObj.timer,
                timerActive: syncTimerObj.timerActive
              }));
            } catch (e) {}
          }
        });

        if (userRole === 'admin') {
          gameState.teams.forEach(team => {
            gun.get('market_sim_pro_v3_session_' + gameState.gameCode).get(`team_sub_${team.id}`).on((data) => {
              if (data) {
                try {
                  const subData = JSON.parse(data);
                  if (subData.round === gameState.currentRound) {
                    setGameState(prev => {
                      const foundTeam = prev.teams.find(t => t.id === team.id);
                      const alreadySubmitted = foundTeam?.history[prev.currentRound]?.cards?.length > 0;
                      if (alreadySubmitted) return prev;

                      const nextTeams = prev.teams.map(t => {
                        if (t.id === team.id) {
                          const nextDeck = t.deck.filter(dc => !subData.cards.map(sc => sc.id).includes(dc.id));
                          return {
                            ...t,
                            deck: nextDeck,
                            history: {
                              ...t.history,
                              [prev.currentRound]: {
                                cards: subData.cards.map(sc => ({ value: sc.value, color: sc.color })),
                                score: 0,
                                isAuto: false,
                                sum: subData.cards[0].value + subData.cards[1].value
                              }
                            }
                          };
                        }
                        return t;
                      });

                      const nextState = { ...prev, teams: nextTeams };
                      globalStateRef.put(JSON.stringify(nextState));
                      return nextState;
                    });
                  }
                } catch(e) {}
              }
            });
          });
        }

        return () => {
          globalStateRef.off();
          timerRef.off();
        };
      }, [gameState.gameCode, userRole, gameState.currentRound]);

      useEffect(() => {
        let interval = null;
        if (userRole === 'admin' && gameState.timerActive && gameState.timer > 0 && gameState.status === 'submitting') {
          interval = setInterval(() => {
            setGameState(prev => {
              const nextTimer = prev.timer - 1;
              const nextActive = nextTimer > 0;
              let nextStatus = prev.status;
              let finalState = { ...prev, timer: nextTimer, timerActive: nextActive };

              if (nextTimer <= 0) {
                finalState = autoSubmitUnsubmittedTeams(finalState);
                nextStatus = 'closed';
              }

              gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('timer_sync').put(JSON.stringify({
                timer: nextTimer,
                timerActive: nextActive
              }));

              if (nextTimer <= 0) {
                gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify({
                  ...finalState,
                  status: nextStatus
                }));
              }
              return finalState;
            });
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [gameState.timerActive, gameState.timer, gameState.status, userRole]);

      useEffect(() => {
        if (gameState.status === 'revealed' && userRole === 'gameplay' && selectedTeamId) {
          setShowRoundResultPopup(true);
        } else {
          setShowRoundResultPopup(false);
        }
      }, [gameState.status, gameState.currentRound, userRole, selectedTeamId]);

      const triggerConfirm = (title, message, onConfirmAction) => {
        setConfirmModal({
          isOpen: true,
          title,
          message,
          onConfirm: () => {
            onConfirmAction();
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const autoSubmitUnsubmittedTeams = (currentState) => {
        const round = currentState.currentRound;
        const updatedTeams = currentState.teams.map(team => {
          const hist = team.history[round];
          const hasSubmitted = hist && hist.cards && hist.cards.length > 0;
          
          if (!hasSubmitted) {
            const sortedDeck = [...team.deck].sort((a, b) => a.value - b.value);
            if (sortedDeck.length >= 2) {
              const autoCards = [sortedDeck[0], sortedDeck[1]];
              const autoCardIds = autoCards.map(c => c.id);
              const nextDeck = team.deck.filter(dc => !autoCardIds.includes(dc.id));
              return {
                ...team,
                deck: nextDeck,
                history: {
                  ...team.history,
                  [round]: {
                    cards: autoCards.map(ac => ({ value: ac.value, color: ac.color })),
                    score: 0,
                    isAuto: true,
                    sum: autoCards[0].value + autoCards[1].value
                  }
                }
              };
            }
          }
          return team;
        });

        return { ...currentState, teams: updatedTeams, status: 'closed', timerActive: false };
      };

      const handleAdminAuthSubmit = (e) => {
        e.preventDefault();
        if (adminPassword === '0321') {
          setUserRole('admin_dashboard');
          setIsPasswordModalOpen(false);
          setAdminPassword('');
          showToast("관리자 인증 완료. 세션 대시보드로 이동합니다.");
        } else {
          showToast("비밀번호가 올바르지 않습니다.", "error");
        }
      };

      const handleCreateSessionSubmit = () => {
        if (!newCourseName.trim()) {
          showToast("과정명을 입력해주세요.", "error");
          return;
        }
        
        const code = generateGameCode();
        const generatedTeams = [];
        for (let i = 1; i <= newTeamCount; i++) {
          generatedTeams.push({
            id: `team-${i}-${Date.now()}`,
            name: `${i}팀`,
            score: 0,
            deck: createInitialDeck(),
            history: {},
            isOccupied: false
          });
        }
        
        const initializedState = {
          gameCode: code,
          courseName: newCourseName,
          isStarted: true,
          currentRound: 1,
          teams: generatedTeams,
          status: 'idle',
          timer: 180,
          timerActive: false,
        };

        gun.get('market_sim_pro_v3_session_' + code).get('global_state').put(JSON.stringify(initializedState));
        
        gun.get(MASTER_LIST_KEY).get(code).put(JSON.stringify({
          gameCode: code,
          courseName: newCourseName,
          teamCount: newTeamCount,
          createdAt: Date.now()
        }));

        showToast(`[${newCourseName}] 개설 완료 (코드: ${code})`);
        setIsCreateGameModalOpen(false);
      };

      const handleParticipantJoin = (e) => {
        e.preventDefault();
        const codeUpper = joinGameCode.trim().toUpperCase();
        
        if(!codeUpper) return;

        gun.get(MASTER_LIST_KEY).get(codeUpper).once((masterDataStr) => {
          if (masterDataStr && masterDataStr !== "null") {
            try {
              const masterData = JSON.parse(masterDataStr);
              if (masterData && masterData.gameCode === codeUpper) {
                gun.get('market_sim_pro_v3_session_' + codeUpper).get('global_state').once((data) => {
                  if (data && data !== "null") {
                    try {
                      const sessionObj = JSON.parse(data);
                      if (sessionObj && sessionObj.gameCode === codeUpper) {
                        setGameState(sessionObj);
                        setUserRole('participant_select_team');
                        showToast("세션 검증 완료. 소속 그룹을 선택하십시오.");
                      } else {
                        showToast("세션 데이터가 일치하지 않습니다.", "error");
                      }
                    } catch(err) {
                      showToast("세션 연결에 실패했습니다.", "error");
                    }
                  } else {
                    showToast("게임 세션 데이터를 아직 불러오지 못했습니다. 다시 시도해주세요.", "warning");
                  }
                });
              } else {
                showToast("등록되지 않은 비활성 게임 코드입니다.", "error");
              }
            } catch(err) {
              showToast("세션 정보를 확인할 수 없습니다.", "error");
            }
          } else {
            showToast("현재 개설되어 진행중인 세션 코드가 아닙니다.", "error");
          }
        });
      };

      const handleUpdateTeamName = (teamId, newName) => {
        if (!newName.trim()) return;
        const nextTeams = gameState.teams.map(t => t.id === teamId ? { ...t, name: newName } : t);
        setGameState(prev => {
          const next = { ...prev, teams: nextTeams };
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
          return next;
        });
        showToast("팀명이 성공적으로 수정되었습니다.");
      };

      const adjustTimer = (amount) => {
        setGameState(prev => {
          const nextTime = Math.max(0, prev.timer + amount);
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('timer_sync').put(JSON.stringify({
            timer: nextTime,
            timerActive: prev.timerActive
          }));
          return { ...prev, timer: nextTime };
        });
      };

      const toggleTimerPause = () => {
        setGameState(prev => {
          const nextActive = !prev.timerActive;
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('timer_sync').put(JSON.stringify({
            timer: prev.timer,
            timerActive: nextActive
          }));
          return { ...prev, timerActive: nextActive };
        });
      };

      const handleStartSubmission = () => {
        setGameState(prev => {
          const next = { ...prev, status: 'submitting', timer: 180, timerActive: true };
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('timer_sync').put(JSON.stringify({
            timer: 180,
            timerActive: true
          }));
          return next;
        });
        showToast("의사결정이 개시되었습니다.");
      };

      const handleCloseSubmission = () => {
        setGameState(prev => {
          const next = autoSubmitUnsubmittedTeams(prev);
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('timer_sync').put(JSON.stringify({
            timer: 0,
            timerActive: false
          }));
          return next;
        });
        showToast("의사결정이 마감되었습니다.");
      };

      const handleRevealResults = () => {
        const round = gameState.currentRound;
        const roundScores = runScoringAlgorithm(round, gameState.teams);

        setGameState(prev => {
          const updatedTeams = prev.teams.map(t => {
            const earned = roundScores[t.id] || 0;
            const currentHist = t.history[round] || { cards: [], isAuto: false, sum: 0 };
            return {
              ...t,
              score: t.score + earned,
              history: { ...t.history, [round]: { ...currentHist, score: earned } }
            };
          });

          const next = { ...prev, teams: updatedTeams, status: 'revealed' };
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
          return next;
        });
        showToast("그룹 손익 대조 정산 완료!");
      };

      const handleNextRound = () => {
        if (gameState.currentRound >= 9) {
          setGameState(prev => {
            const next = { ...prev, status: 'ended' };
            gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
            return next;
          });
          return;
        }

        setGameState(prev => {
          const next = { ...prev, currentRound: prev.currentRound + 1, status: 'idle', timer: 180, timerActive: false };
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
          return next;
        });
        setSelectedCards([]);
      };

      const handlePrevRound = () => {
        if (gameState.currentRound <= 1) return;
        const prevRound = gameState.currentRound - 1;

        setGameState(prev => {
          const updatedTeams = prev.teams.map(t => {
            const prevRoundScore = t.history[prevRound]?.score || 0;
            const currentRoundScore = t.history[prev.currentRound]?.score || 0;
            const restoredScore = Math.max(0, t.score - prevRoundScore - currentRoundScore);
            
            const nextHistory = { ...t.history };
            delete nextHistory[prev.currentRound];
            delete nextHistory[prevRound];

            return { ...t, score: restoredScore, history: nextHistory };
          });

          const next = { ...prev, currentRound: prevRound, status: 'idle', teams: updatedTeams, timer: 180, timerActive: false };
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
          return next;
        });
      };

      const handleManualScoreEdit = () => {
        const value = parseInt(editScoreValue, 10);
        if (isNaN(value)) {
          showToast("올바른 수치를 입력해 주세요.", "error");
          return;
        }

        setGameState(prev => {
          const updatedTeams = prev.teams.map(t => {
            if (t.id === editingScoreTeamId) {
              const round = prev.currentRound;
              const currentHist = t.history[round] || { cards: [], score: 0 };
              const diff = value - (currentHist.score || 0);

              return {
                ...t,
                score: t.score + diff,
                history: { ...t.history, [round]: { ...currentHist, score: value } }
              };
            }
            return t;
          });
          const next = { ...prev, teams: updatedTeams };
          gun.get('market_sim_pro_v3_session_' + prev.gameCode).get('global_state').put(JSON.stringify(next));
          return next;
        });

        setEditingScoreTeamId(null);
        setEditScoreValue('');
        showToast("점수 보정이 적용되었습니다.");
      };

      const handleResetGame = () => {
        triggerConfirm("경고: 진행 데이터 초기화", "주의! 현재 세션의 모든 라운드 진행 상황과 점수가 1라운드로 완전히 포맷됩니다. 그룹 설정은 유지됩니다. 진행하시겠습니까?", () => {
          const generatedTeams = gameState.teams.map(t => ({
            ...t,
            score: 0,
            deck: createInitialDeck(),
            history: {},
            isOccupied: false
          }));

          const resetState = {
            ...gameState,
            currentRound: 1,
            teams: generatedTeams,
            status: 'idle',
            timer: 180,
            timerActive: false,
          };
          
          gun.get('market_sim_pro_v3_session_' + gameState.gameCode).get('global_state').put(JSON.stringify(resetState));
          setGameState(resetState);
          showToast("세션 진행 데이터가 성공적으로 초기화되었습니다.");
        });
      };

      const handleSelectCard = (card) => {
        const team = gameState.teams.find(t => t.id === selectedTeamId);
        if (!team) return;

        const hasSubmitted = team.history[gameState.currentRound] && team.history[gameState.currentRound].cards.length > 0;
        if (hasSubmitted) return;

        setSelectedCards(prev => {
          if (prev.some(c => c.id === card.id)) return prev.filter(c => c.id !== card.id);
          if (prev.length >= 2) return [prev[1], card];
          return [...prev, card];
        });
      };

      const handlePromptSubmitCards = () => {
        if (selectedCards.length !== 2) {
          showToast("카드 2장을 선택해 주십시오.", "error");
          return;
        }

        triggerConfirm(
          "의사결정 최종 전송", 
          `선택하신 [${selectedCards.map(c => c.value).join(', ')}] 카드를 최종 제출하시겠습니까? 전송 이후에는 수정할 수 없습니다.`, 
          () => {
            const round = gameState.currentRound;
            
            gun.get('market_sim_pro_v3_session_' + gameState.gameCode).get(`team_sub_${selectedTeamId}`).put(JSON.stringify({
              round: round,
              cards: selectedCards.map(sc => ({ value: sc.value, color: sc.color }))
            }));

            setGameState(prev => {
              const nextTeams = prev.teams.map(t => {
                if (t.id === selectedTeamId) {
                  const selectedIds = selectedCards.map(sc => sc.id);
                  const nextDeck = t.deck.filter(dc => !selectedIds.includes(dc.id));
                  return {
                    ...t,
                    deck: nextDeck,
                    history: {
                      ...t.history,
                      [round]: {
                        cards: selectedCards.map(sc => ({ value: sc.value, color: sc.color })),
                        score: 0,
                        isAuto: false,
                        sum: selectedCards[0].value + selectedCards[1].value
                      }
                    }
                  };
                }
                return t;
              });
              return { ...prev, teams: nextTeams };
            });

            setSelectedCards([]);
            showToast("의사결정이 전송되었습니다.");
          }
        );
      };

      const handleExportCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "순위,그룹명,누적 성과 스코어,남은 카드 개수\n";
        const sortedTeams = [...gameState.teams].sort((a, b) => b.score - a.score);
        sortedTeams.forEach((t, index) => {

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Market_Leaderboard_${gameState.courseName}_Round_${gameState.currentRound}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const currentStageInfo = MARKET_STAGES[gameState.currentRound] || { name: "종료", rules: "", color: "" };

            <div className="flex items-center space-x-2.5">
              <div className="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-600 to-cyan-500 flex items-center justify-center text-white font-black text-sm tracking-tighter shadow-md">M</div>
              <div>
                <h1 className="text-xs font-black text-white tracking-tight uppercase flex items-center">

              <button
                onClick={() => {

                  if (userRole === 'admin') {
                    title = "대시보드 이동";
                    msg = "게임 제어 화면을 이탈하여 세션 목록 대시보드로 이동하시겠습니까?";
                  } else if (userRole === 'admin_dashboard') {
                    title = "로그아웃";
                    msg = "강사 관리자 화면에서 로그아웃 하시겠습니까?";
                  }

                  triggerConfirm(title, msg, () => {
                    if (userRole === 'gameplay' && selectedTeamId) {
                      const nextTeams = gameState.teams.map(t => t.id === selectedTeamId ? { ...t, isOccupied: false } : t);
                      const nextState = { ...gameState, teams: nextTeams };
                      gun.get('market_sim_pro_v3_session_' + gameState.gameCode).get('global_state').put(JSON.stringify(nextState));
                    }
                    
                    const emptyState = { gameCode: '', courseName: '', isStarted: false, currentRound: 1, teams: [], status: 'idle', timer: 180, timerActive: false };
                    
                    if (userRole === 'admin') {
                      setUserRole('admin_dashboard');
                      setGameState(emptyState);
                    } else if (userRole === 'admin_dashboard') {
                      setUserRole('landing');
                      setGameState(emptyState);
                    } else {
                      setUserRole('landing');
                      setGameState(emptyState);
                    }
                    setSelectedTeamId('');
                  });
                }}
                className="px-2.5 py-1.5 bg-[#161D30] hover:bg-red-950/40 text-slate-300 hover:text-red-400 border border-[#1E294D] rounded-xl text-[10px] font-black transition-colors"
              >
                {userRole === 'admin' ? '대시보드 이동' : userRole === 'admin_dashboard' ? '로그아웃' : '대기실 이동'}
              </button>
            )}
          </header>

          {toast && (

              <div className={`flex items-center space-x-2.5 px-4 py-3 rounded-xl border shadow-2xl text-[11px] font-black tracking-wide ${
                toast.type === 'error' ? 'bg-red-950/90 border-red-500/50 text-red-200' :

                'bg-[#131B31]/95 border-indigo-500/50 text-indigo-100 shadow-indigo-500/10'
              }`}>
                <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-ping shrink-0"></span>
                <span className="leading-snug">{toast.message}</span>
              </div>

          {confirmModal.isOpen && (

              <div className="bg-[#121829] border border-[#1E294D] rounded-2xl p-5 max-w-sm w-full shadow-2xl relative">
                <div className="mx-auto w-8 h-8 bg-amber-950/50 border border-amber-500/30 text-amber-400 rounded-full flex items-center justify-center mb-3"><AlertIcon /></div>

                <div className="flex space-x-2">
                  <button onClick={() => setConfirmModal(prev => ({ ...prev, isOpen: false }))} className="flex-1 py-2 bg-[#161D30] hover:bg-[#1E294B] text-slate-400 rounded-xl text-[10px] font-black transition-colors">취소</button>
                  <button onClick={confirmModal.onConfirm} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[10px] font-black transition-colors shadow-md">확인</button>
                </div>
              </div>
            </div>

          {}
          {userRole === 'landing' && (

              <div className="max-w-md w-full bg-[#121829] rounded-3xl border border-[#1E294D] p-6 md:p-8 shadow-2xl relative overflow-hidden text-center">

                <div className="mb-8">

                  <h2 className="text-lg font-black tracking-tight text-white uppercase">Market Simulation</h2>
                  <p className="text-[10px] text-slate-400 mt-1 font-bold">임직원 핵심 경영 의사결정 비즈니스 플랫폼</p>
                </div>
                <div className="space-y-4 flex flex-col items-center">
                  <button onClick={() => setUserRole('participant_join_flow')} className="w-full max-w-sm h-24 bg-gradient-to-br from-indigo-600 via-indigo-700 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white rounded-2xl text-base font-black shadow-lg shadow-indigo-900/30 transition-all flex flex-col items-center justify-center space-y-1 transform active:scale-[0.98]">
                    <span className="text-lg font-extrabold tracking-wide">👥 참가자(팀) 접속하기</span>

                    <ShieldIcon /><span className="ml-1.5 font-black text-[11px] tracking-tight">강사 통제반 (Admin) 접속</span>

                <p className="text-[10px] text-slate-400 mb-4 leading-relaxed font-semibold">교육 운영 보호용 세션입니다. 인가된 비밀번호를 입력해 주십시오.</p>

                    <div>
                      <div className="flex justify-between items-start mb-2">
                        <span className="text-[10px] bg-indigo-950/60 text-indigo-300 border border-indigo-500/30 px-2 py-0.5 rounded font-black">코드: {session.gameCode}</span>
                        <span className="text-[9px] text-slate-500 font-bold">{new Date(session.createdAt).toLocaleDateString()}</span>

                      <button onClick={() => { triggerConfirm("세션 삭제", `[${session.courseName}] 과정을 영구 삭제하시겠습니까?`, () => { gun.get(MASTER_LIST_KEY).get(session.gameCode).put("null"); showToast("세션이 삭제되었습니다."); }); }} className="flex-1 py-2.5 bg-[#161D30] hover:bg-red-950/40 text-slate-400 hover:text-red-400 border border-[#1E294D] hover:border-red-500/30 rounded-xl text-[11px] font-black transition-colors">삭제</button>
                      <button onClick={() => { setGameState(prev => ({ ...prev, gameCode: session.gameCode })); setUserRole('admin'); showToast(`${session.courseName} 제어반에 입장했습니다.`); }} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[11px] font-black transition-colors shadow-md">입장</button>

                {Object.keys(adminSessions).length === 0 && (

                <div className="border-b border-[#1E294B]/50 pb-3.5 mb-4"><span className="text-[8px] uppercase font-black tracking-widest text-indigo-400">Session Operations Desk</span><h3 className="text-xs font-black text-white mt-1">강사 원격 실시간 제어 스위치</h3></div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                  
                  <div className="bg-[#161D30] rounded-2xl p-4 border border-[#1E294D]/60 flex flex-col justify-between">
                    <div><span className="text-[8px] text-slate-400 uppercase tracking-widest font-black block mb-1">의사결정 제어</span><h4 className="text-xs font-black text-slate-300">의사결정 권한 오픈/조종</h4></div>
                    <div className="mt-4 flex space-x-2">
                      <button onClick={handleStartSubmission} disabled={gameState.status === 'submitting' || gameState.status === 'revealed' || gameState.status === 'ended'} className="flex-1 py-2.5 bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 disabled:opacity-30 disabled:from-slate-800 disabled:to-slate-800 text-white rounded-xl text-xs font-black transition-all shadow-md flex items-center justify-center"><PlayIcon /><span>제출 시작</span></button>
                      <button onClick={handleCloseSubmission} disabled={gameState.status !== 'submitting'} className="flex-1 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-slate-800 disabled:opacity-30 text-slate-300 rounded-xl text-xs font-black transition-all flex items-center justify-center"><SquareIcon /><span>마감하기</span></button>
                    </div>
                  </div>

                  <div className="bg-[#161D30] rounded-2xl p-4 border border-[#1E294D]/60 flex flex-col justify-between">
                    <div><span className="text-[8px] text-slate-400 uppercase tracking-widest font-black block mb-1">시장 정산</span><h4 className="text-xs font-black text-slate-300">손익 자동 연산 및 리포트 공개</h4></div>
                    <div className="mt-4">
                      <button onClick={handleRevealResults} disabled={gameState.status !== 'closed'} className="w-full py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 disabled:opacity-30 disabled:from-slate-800 disabled:to-slate-800 text-white rounded-xl text-xs font-black transition-all shadow-md flex items-center justify-center"><AwardIcon /><span>결과 연산 및 실시간 공개</span></button>
                    </div>
                  </div>

                  <div className="bg-[#161D30] rounded-2xl p-4 border border-[#1E294D]/60 flex flex-col justify-between">
                    <div><span className="text-[8px] text-slate-400 uppercase tracking-widest font-black block mb-1">페이즈 조율</span><h4 className="text-xs font-black text-slate-300">다음 라운드 진입 및 안전 롤백</h4></div>
                    <div className="mt-4 flex space-x-2">
                      <button onClick={handlePrevRound} disabled={gameState.currentRound <= 1} className="px-3 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-slate-800 disabled:opacity-30 text-slate-300 rounded-xl text-xs font-black"><ChevronLeftIcon /></button>
                      <button onClick={handleNextRound} disabled={gameState.status !== 'revealed'} className="flex-1 py-2.5 bg-gradient-to-r from-violet-600 to-violet-700 hover:from-violet-500 hover:to-violet-600 disabled:opacity-30 disabled:from-slate-800 disabled:to-slate-800 text-white rounded-xl text-xs font-black flex items-center justify-center space-x-1"><span>{gameState.currentRound === 9 ? '최종 발표' : '다음 라운드'}</span><ChevronRightIcon /></button>
                    </div>
                  </div>

                  <div className="bg-[#161D30] rounded-2xl p-4 border border-[#1E294D]/60 flex flex-col justify-between">
                    <div><span className="text-[8px] text-slate-400 uppercase tracking-widest font-black block mb-1">시간 통제 및 리셋</span><h4 className="text-xs font-black text-slate-300">타이머 보정 및 데이터 초기화</h4></div>
                    <div className="mt-4 flex items-center space-x-1.5">
                      <button onClick={toggleTimerPause} disabled={gameState.status !== 'submitting'} className="px-2 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-[#1E294B] disabled:opacity-30 rounded-xl text-[10px] font-black text-slate-300">{gameState.timerActive ? "일시정지" : "재개"}</button>
                      <button onClick={() => adjustTimer(30)} disabled={gameState.status !== 'submitting'} className="flex-1 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-[#1E294B] disabled:opacity-30 text-slate-300 rounded-xl text-[10px] font-black">+30s</button>
                      <button onClick={() => adjustTimer(-30)} disabled={gameState.status !== 'submitting'} className="flex-1 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-[#1E294B] disabled:opacity-30 text-slate-300 rounded-xl text-[10px] font-black">-30s</button>
                      <button onClick={handleResetGame} className="px-2.5 py-2.5 bg-red-950/50 hover:bg-red-900 border border-red-800 text-red-400 rounded-xl text-[10px] font-black" title="점수 및 라운드 포맷">포맷</button>
                    </div>
                  </div>

                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-[#121829] border border-[#1E294D] rounded-3xl p-6 shadow-xl lg:col-span-2">
                  <div className="flex items-center justify-between border-b border-[#1E294B]/50 pb-3.5 mb-4">
                    <div><span className="text-[8px] uppercase font-black tracking-widest text-indigo-400">Real-time Stream</span><h3 className="text-xs font-black text-white">그룹별 의사결정 수신 및 점유 현황</h3></div>
                    <span className="text-[10px] font-black text-indigo-300 bg-indigo-950/60 border border-indigo-500/20 px-2.5 py-1 rounded-lg">활성: {gameState.teams.length}개 팀</span>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                    {gameState.teams.map(team => {
                      const round = gameState.currentRound;
                      const hist = team.history[round];
                      const hasSubmitted = hist && hist.cards && hist.cards.length > 0;
                      
                      return (
                        <div key={team.id} className={`p-4 rounded-2xl border transition-all ${hasSubmitted ? 'bg-[#151D33]/40 border-[#1F2E57]' : gameState.status === 'submitting' ? 'bg-amber-950/15 border-amber-500/40 animate-pulse' : 'bg-[#0D1222]/60 border-[#1E294D]/60'}`}>
                          <div className="flex items-center justify-between mb-2.5">
                            <input type="text" value={team.name} onChange={(e) => handleUpdateTeamName(team.id, e.target.value)} className={`text-xs font-black bg-transparent border-b outline-none w-28 ${team.isOccupied ? 'text-indigo-300 border-transparent hover:border-indigo-400 focus:border-indigo-400' : 'text-slate-400 border-transparent hover:border-slate-600 focus:border-indigo-400'}`} title="팀명 수정" />
                            {hasSubmitted ? (
                              <span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${hist.isAuto ? 'bg-amber-950/80 text-amber-400 border border-amber-500/20' : 'bg-emerald-950/80 text-emerald-400 border border-emerald-500/20'}`}>{hist.isAuto ? '자동 제출 완료' : '전송 완료'}</span>
                            ) : (
                              <span className={`text-[9px] font-black px-2.5 py-0.5 rounded-full ${team.isOccupied ? 'text-indigo-400 bg-indigo-950/60 border border-indigo-500/30' : 'text-slate-500 bg-[#161D30]'}`}>
                                {team.isOccupied ? '현재 참가자 접속중' : gameState.status === 'submitting' ? '전술 구성 중' : '대기 상태'}
                              </span>
                            )}
                          </div>
                          <div className="flex items-center justify-between bg-[#0B0F19] border border-[#1E294D]/60 rounded-xl p-2">
                            {hasSubmitted ? (
                              <>
                                <div className="flex -space-x-1">
                                  {hist.cards.map((c, index) => (<div key={index} className={`w-6 h-8 rounded text-[10px] font-black border flex items-center justify-center ${gameState.status === 'revealed' || gameState.status === 'closed' ? c.color === 'red' ? 'bg-red-950/80 text-red-400 border-red-500/30' : 'bg-slate-900 text-slate-100 border-slate-700' : 'bg-[#1F294D] text-slate-400 border-indigo-500/10'}`}>{gameState.status === 'revealed' || gameState.status === 'closed' ? c.value : '?'}</div>))}
                                </div>
                                <span className="text-[9px] font-black text-slate-400">
                                  {gameState.status === 'revealed' || gameState.status === 'closed' ? (<span>결합 가치: <strong className="text-indigo-400">{hist.cards[0].value + hist.cards[1].value}</strong></span>) : (<span className="text-indigo-400 flex items-center space-x-1"><span className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-ping"></span><span>기밀 데이터 수신됨</span></span>)}
                                </span>
                              </>
                            ) : (<span className="text-[9px] text-slate-500 py-1 font-semibold">의사결정 보강 대기</span>)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-[#121829] border border-[#1E294D] rounded-3xl p-6 shadow-xl">
                  <div className="flex items-center justify-between border-b border-[#1E294B]/50 pb-3.5 mb-4">
                    <div><span className="text-[8px] uppercase font-black tracking-widest text-indigo-400">Leaderboard</span><h3 className="text-xs font-black text-white">종합 순위표</h3></div>
                    <button onClick={handleExportCSV} className="p-1.5 text-slate-400 hover:text-white rounded-lg border border-[#1E294D] hover:bg-[#1E294B] transition-colors" title="CSV 다운로드"><DownloadIcon /></button>
                  </div>
                  <div className="space-y-2.5 max-h-[350px] overflow-y-auto pr-1">
                    {[...gameState.teams].sort((a, b) => b.score - a.score).map((team, index) => {
                      const isTopRank = index === 0;
                      return (
                        <div key={team.id} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${isTopRank ? 'bg-indigo-950/20 border-indigo-500/30 shadow-indigo-950/20' : 'bg-[#0D1222]/50 border-[#1E294D]'}`}>
                          <div className="flex items-center space-x-3">
                            <span className={`w-5.5 h-5.5 rounded-lg flex items-center justify-center font-mono text-[10px] font-black ${isTopRank ? 'bg-indigo-500/30 text-indigo-300' : 'bg-[#1E294B] text-slate-400'}`}>{index + 1}</span>
                            <div>
                              <span className="text-xs font-black text-slate-200">{team.name}</span>
                              <span className="text-[8px] text-slate-500 block font-semibold">잔여 카드: {team.deck.length}장</span>
                            </div>
                          </div>
                          <div className="flex items-center space-x-2">
                            <span className="font-mono text-xs font-black text-white">{team.score.toLocaleString()}P</span>
                            <button onClick={() => { setEditingScoreTeamId(team.id); setEditScoreValue(team.history[gameState.currentRound]?.score || '0'); }} className="p-1 text-slate-500 hover:text-slate-300 transition-colors"><EditIcon /></button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="bg-[#121829] border border-[#1E294D] rounded-3xl p-6 shadow-xl overflow-x-auto">
                <div className="border-b border-[#1E294B]/50 pb-3.5 mb-4"><h3 className="text-xs font-black text-white">종합 시장 경영 성과 누계 리포트</h3></div>
                <table className="w-full text-left border-collapse min-w-[700px]">
                  <thead><tr className="border-b border-[#1E294D] text-[9px] uppercase font-black text-slate-500 tracking-wider"><th className="py-2.5">그룹 프로필</th>{Array.from({ length: 9 }).map((_, i) => (<th key={i} className="py-2.5 text-center">R{i + 1}</th>))}<th className="py-2.5 text-right">종합 누계</th></tr></thead>
                  <tbody className="divide-y divide-[#1E294D]/30 text-xs">
                    {gameState.teams.map(team => (
                      <tr key={team.id} className="hover:bg-[#151D33]/20">
                        <td className="py-3 font-black text-slate-200">{team.name}</td>
                        {Array.from({ length: 9 }).map((_, index) => {
                          const h = team.history[index + 1];
                          return (<td key={index} className="py-3 text-center">{h ? (<div className="inline-flex flex-col items-center font-semibold"><span className="font-mono text-[9px] font-bold text-slate-500">[{h.cards.map(c => c.value).join('+')}]</span><span className={`text-[9px] font-black ${h.score > 0 ? 'text-emerald-400' : h.score < 0 ? 'text-red-400' : 'text-slate-400'}`}>{h.score > 0 ? `+${h.score}` : h.score}P</span></div>) : (<span className="text-slate-600 font-bold">-</span>)}</td>);
                        })}
                        <td className="py-3 font-mono font-black text-right text-indigo-400">{team.score.toLocaleString()}P</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {editingScoreTeamId && (
                <div className="fixed inset-0 bg-[#060810]/80 backdrop-blur-xs flex items-center justify-center z-50">
                  <div className="bg-[#121829] border border-[#1E294D] rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                    <h4 className="text-xs font-black text-white mb-1.5">임의 점수 가감 시스템 조율</h4>
                    <input type="number" value={editScoreValue} onChange={(e) => setEditScoreValue(e.target.value)} placeholder="변경 반영할 라운드 점수 입력" className="w-full px-3.5 py-2.5 border border-[#1E294D] bg-[#0B0F19] text-white rounded-xl text-xs font-black outline-none focus:border-indigo-500 mb-4 text-center font-mono mt-4" />
                    <div className="flex space-x-2">
                      <button onClick={() => setEditingScoreTeamId(null)} className="flex-1 py-2 bg-[#161D30] text-slate-400 rounded-xl text-xs font-black">취소</button>
                      <button onClick={handleManualScoreEdit} className="flex-1 py-2 bg-indigo-600 text-white rounded-xl text-xs font-black">보정값 적용</button>
                    </div>
                  </div>
                </div>
              )}
            </main>
          )}

          <footer className="border-t border-[#1E294B]/80 bg-[#0A0E1A] py-6 text-center text-[10px] text-slate-500 font-bold px-4">
            <p>© 2026 Market Simulation Game Engine. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
