  <!-- 맞춤형 스타일 및 네온 비콘 깜빡임 애니메이션 주입 -->

    /* 에코드림볼드 분위기의 굵고 정갈한 서체 전역 적용 */

      font-family: 'Nunito', 'Plus Jakarta Sans', -apple-system, sans-serif;
      font-weight: 800;
      background-color: #0A0E1A;

    /* 실시간 네온 점멸 애니메이션 */
    @keyframes customBlink {
      0%, 100% { opacity: 1; transform: scale(1); filter: brightness(1.2); }
      50% { opacity: 0.3; transform: scale(0.97); filter: brightness(0.8); }

    .animate-custom-blink {
      animation: customBlink 1.2s infinite ease-in-out;
    }

    @keyframes neonPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(99, 102, 241, 0.4); border-color: rgba(99, 102, 241, 0.6); }
      50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.8); border-color: rgba(99, 102, 241, 1); }

      animation: neonPulse 1.5s infinite ease-in-out;

      0%, 100% { box-shadow: 0 0 8px rgba(6, 182, 212, 0.4); border-color: rgba(6, 182, 212, 0.6); }
      50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.8); border-color: rgba(6, 182, 212, 1); }

    .pulse-cyan-glowing {
      animation: cyanPulse 1.5s infinite ease-in-out;

    @keyframes emeraldPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6); }

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- SVG Icons ---
    const ShieldIcon = () => (

    const EditIcon = () => (
      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    );

    const AlertIcon = () => (
      <svg className="w-5 h-5 text-amber-400 mr-2 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );

    // --- MARKET STAGE CONFIGURATIONS ---
    const MARKET_STAGES = {
      1: { name: "초기 시장 (R1~3)", rules: "최고 단독 +120, 최고 동점 +60 / 최저 단독 -60, 최저 동점 -30", color: "border-cyan-500/80 text-cyan-400 bg-cyan-950/40", glowColor: "rgba(6, 182, 212, 0.5)", hex: "#06B6D4" },
      2: { name: "초기 시장 (R1~3)", rules: "최고 단독 +120, 최고 동점 +60 / 최저 단독 -60, 최저 동점 -30", color: "border-cyan-500/80 text-cyan-400 bg-cyan-950/40", glowColor: "rgba(6, 182, 212, 0.5)", hex: "#06B6D4" },
      3: { name: "초기 시장 (R1~3)", rules: "최고 단독 +120, 최고 동점 +60 / 최저 단독 -60, 최저 동점 -30", color: "border-cyan-500/80 text-cyan-400 bg-cyan-950/40", glowColor: "rgba(6, 182, 212, 0.5)", hex: "#06B6D4" },
      4: { name: "완전경쟁 시장 (R4~6)", rules: "최고 단독 +120, 최고 동점 0 / 최저 단독 -80, 최저 동점 0", color: "border-emerald-500/80 text-emerald-400 bg-emerald-950/40", glowColor: "rgba(16, 185, 129, 0.5)", hex: "#10B981" },
      5: { name: "완전경쟁 시장 (R4~6)", rules: "최고 단독 +120, 최고 동점 0 / 최저 단독 -80, 최저 동점 0", color: "border-emerald-500/80 text-emerald-400 bg-emerald-950/40", glowColor: "rgba(16, 185, 129, 0.5)", hex: "#10B981" },
      6: { name: "완전경쟁 시장 (R4~6)", rules: "최고 단독 +120, 최고 동점 0 / 최저 단독 -80, 최저 동점 0", color: "border-emerald-500/80 text-emerald-400 bg-emerald-950/40", glowColor: "rgba(16, 185, 129, 0.5)", hex: "#10B981" },
      7: { name: "독점 시장 (R7~9)", rules: "최고 단독 +180 (동점 시 차순위 단독팀) / 최저 -120 / 중간 -40", color: "border-violet-500/80 text-violet-400 bg-violet-950/40", glowColor: "rgba(139, 92, 246, 0.5)", hex: "#8B5CF6" },
      8: { name: "독점 시장 (R7~9)", rules: "최고 단독 +180 (동점 시 차순위 단독팀) / 최저 -120 / 중간 -40", color: "border-violet-500/80 text-violet-400 bg-violet-950/40", glowColor: "rgba(139, 92, 246, 0.5)", hex: "#8B5CF6" },
      9: { name: "독점 시장 (R7~9)", rules: "최고 단독 +180 (동점 시 차순위 단독팀) / 최저 -120 / 중간 -40", color: "border-violet-500/80 text-violet-400 bg-violet-950/40", glowColor: "rgba(139, 92, 246, 0.5)", hex: "#8B5CF6" }
    };

    // --- GAME UTILITIES ---
    const createInitialDeck = () => {
      const deck = [];
      for (let val = 1; val <= 9; val++) {
        deck.push({ id: `red-${val}-1`, value: val, color: 'red' });
        deck.push({ id: `black-${val}-2`, value: val, color: 'black' });
      }
      return deck;
    };

    const generateGameCode = () => {
      const nums = '0123456789';
      let code = 'MK';
      for (let i = 0; i < 4; i++) {
        code += nums.charAt(Math.floor(Math.random() * nums.length));
      }
      return code;
    };

    // --- STREAMING_CHUNK: Setting up scoring engine for simulations... ---
    // 정밀 스코어링 알고리즘 설계
    const runScoringAlgorithm = (round, teams) => {
      const scores = {};
      
      const submissions = teams.map(team => {
        const hist = team.history[round];
        if (!hist || !hist.cards || hist.cards.length < 2) {
          return { teamId: team.id, sum: 0, valid: false };
        }
        const sum = hist.cards[0].value + hist.cards[1].value;
        return { teamId: team.id, sum, valid: true };
      });

      const validSubmissions = submissions.filter(s => s.valid);
      if (validSubmissions.length === 0) {
        teams.forEach(t => { scores[t.id] = 0; });
        return scores;
      }

      const sums = validSubmissions.map(s => s.sum);
      const maxSum = Math.max(...sums);
      const minSum = Math.min(...sums);

      const maxTeams = validSubmissions.filter(s => s.sum === maxSum);
      const minTeams = validSubmissions.filter(s => s.sum === minSum);

      // Round 1 ~ 3: 초기 시장
      if (round >= 1 && round <= 3) {
        validSubmissions.forEach(sub => {
          let earned = 0;
          if (sub.sum === maxSum) {
            earned = maxTeams.length === 1 ? 120 : 60;
          } else if (sub.sum === minSum) {
            earned = minTeams.length === 1 ? -60 : -30;
          }
          scores[sub.teamId] = earned;
        });

      // Round 4 ~ 6: 완전경쟁 시장
      } else if (round >= 4 && round <= 6) {
        validSubmissions.forEach(sub => {
          let earned = 0;
          if (sub.sum === maxSum) {
            earned = maxTeams.length === 1 ? 120 : 0;
          } else if (sub.sum === minSum) {
            earned = minTeams.length === 1 ? -80 : 0;
          }
          scores[sub.teamId] = earned;
        });

      // Round 7 ~ 9: 독점 시장
      } else if (round >= 7 && round <= 9) {
        let winnerId = null;
        if (maxTeams.length === 1) {
          winnerId = maxTeams[0].teamId;
        } else {
          // 독점 시장의 특별 룰: 동점 발생 시 차순위 단독팀 수색
          const sortedUniqueSums = [...new Set(sums)].sort((a, b) => b - a);
          for (const currentSum of sortedUniqueSums) {
            const matchingTeams = validSubmissions.filter(s => s.sum === currentSum);
            if (matchingTeams.length === 1) {
              winnerId = matchingTeams[0].teamId;
              break;
            }
          }
        }

        validSubmissions.forEach(sub => {
          let earned = -40; // 기본 중간값 손익
          if (sub.teamId === winnerId) {
            earned = 180;
          } else if (sub.sum === minSum) {
            earned = -120;
          }
          scores[sub.teamId] = earned;
        });
      }

      // 미제출 실격 페널티 부여
      submissions.forEach(sub => {
        if (!sub.valid) {
          scores[sub.teamId] = -100;
        }
      });

      return scores;
    };

    // --- STREAMING_CHUNK: Initializing state variables... ---
    // 메인 React Application 정의
    function App() {
      const [gameState, setGameState] = useState(() => {
        const localData = localStorage.getItem('market_simulation_game_state_v3_navy');
        if (localData) {
          try {
            return JSON.parse(localData);
          } catch (e) {
            console.error("Localstorage load error:", e);
          }
        }
        return {
          gameCode: '',
          isStarted: false,
          currentRound: 1,
          teams: [],
          status: 'idle', // 'idle' | 'submitting' | 'closed' | 'revealed' | 'ended'
          timer: 180,
          timerActive: false,
        };
      });

      const [userRole, setUserRole] = useState('landing'); // 'landing' | 'admin' | 'participant_join_flow' | 'participant_select_team' | 'gameplay'
      const [selectedTeamId, setSelectedTeamId] = useState('');
      const [adminPassword, setAdminPassword] = useState('');
      const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
      const [joinGameCode, setJoinGameCode] = useState('');
      
      const [toast, setToast] = useState(null);
      const [selectedCards, setSelectedCards] = useState([]);
      const [isSubmitConfirmOpen, setIsSubmitConfirmOpen] = useState(false);
      const [editingScoreTeamId, setEditingScoreTeamId] = useState(null);
      const [editScoreValue, setEditScoreValue] = useState('');
      const [showRoundResultPopup, setShowRoundResultPopup] = useState(false);

      // 로컬 스토리지 자동 저장 동기화
      useEffect(() => {
        localStorage.setItem('market_simulation_game_state_v3_navy', JSON.stringify(gameState));
      }, [gameState]);

      // 실시간 정산 시 참가자 전원에게 팝업 리포트 활성화
      useEffect(() => {
        if (gameState.status === 'revealed' && userRole === 'gameplay' && selectedTeamId) {
          setShowRoundResultPopup(true);
        } else {
          setShowRoundResultPopup(false);
        }
      }, [gameState.status, gameState.currentRound, userRole, selectedTeamId]);

      // 카운트다운 타이머 연동
      useEffect(() => {
        let interval = null;
        if (gameState.timerActive && gameState.timer > 0 && gameState.status === 'submitting') {
          interval = setInterval(() => {
            setGameState(prev => {
              if (prev.timer <= 1) {
                clearInterval(interval);
                return autoSubmitUnsubmittedTeams({
                  ...prev,
                  timer: 0,
                  timerActive: false,
                  status: 'closed'
                });
              }
              return { ...prev, timer: prev.timer - 1 };
            });
          }, 1000);
        } else if (gameState.timer === 0 && gameState.status === 'submitting') {
          setGameState(prev => autoSubmitUnsubmittedTeams({ ...prev, timerActive: false, status: 'closed' }));
        }
        return () => clearInterval(interval);
      }, [gameState.timerActive, gameState.timer, gameState.status]);

      // 토스트 메시지 함수
      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => {
          setToast(null);
        }, 4000);
      };

      // 자동 제출 엔진 (미제출 팀 강제 최소값 회수)
      const autoSubmitUnsubmittedTeams = (currentState) => {
        const round = currentState.currentRound;
        const updatedTeams = currentState.teams.map(team => {
          const hist = team.history[round];
          const hasSubmitted = hist && hist.cards && hist.cards.length > 0;
          
          if (!hasSubmitted) {
            const sortedDeck = [...team.deck].sort((a, b) => a.value - b.value);
            if (sortedDeck.length >= 2) {
              const autoCards = [sortedDeck[0], sortedDeck[1]];
              const autoCardIds = autoCards.map(c => c.id);
              const nextDeck = team.deck.filter(dc => !autoCardIds.includes(dc.id));
              
              return {
                ...team,
                deck: nextDeck,
                history: {
                  ...team.history,
                  [round]: {
                    cards: autoCards.map(ac => ({ value: ac.value, color: ac.color })),
                    score: 0,
                    isAuto: true,
                    sum: autoCards[0].value + autoCards[1].value
                  }
                }
              };
            } else {
              return {
                ...team,
                history: {
                  ...team.history,
                  [round]: {
                    cards: [{ value: 1, color: 'red' }, { value: 1, color: 'black' }],
                    score: 0,
                    isAuto: true,
                    sum: 2
                  }
                }
              };
            }
          }
          return team;
        });

        showToast("의사결정이 마감되었습니다. 미제출 팀은 보유 카드 중 가장 최저 가치 카드가 무작위 강제 제출되었습니다.", "warning");
        return {
          ...currentState,
          teams: updatedTeams,
          status: 'closed',
          timerActive: false
        };
      };

      const handleCreateGame = (numberOfTeams) => {
        const code = generateGameCode();
        const newTeams = [];
        for (let i = 1; i <= numberOfTeams; i++) {
          newTeams.push({
            id: `team-${i}-${Date.now()}`,
            name: `${i}팀 (Team ${i})`,
            score: 0,
            deck: createInitialDeck(),
            history: {}
          });
        }

        setGameState({
          gameCode: code,
          isStarted: true,
          currentRound: 1,
          teams: newTeams,
          status: 'idle',
          timer: 180,
          timerActive: false,
        });
        showToast(`시장 시뮬레이션 세션이 정상 구축되었습니다. 코드: ${code}`);
      };

      const handleUpdateTeamName = (teamId, newName) => {
        if (!newName.trim()) return;
        setGameState(prev => ({
          ...prev,
          teams: prev.teams.map(t => t.id === teamId ? { ...t, name: newName } : t)
        }));
        showToast("팀명이 성공적으로 교정되었습니다.");
      };

      const adjustTimer = (amount) => {
        setGameState(prev => ({
          ...prev,
          timer: Math.max(0, prev.timer + amount)
        }));
        showToast(`남은 시간이 ${amount > 0 ? '+' : ''}${amount}초 보정되었습니다.`);
      };

      const toggleTimerPause = () => {
        setGameState(prev => ({
          ...prev,
          timerActive: !prev.timerActive
        }));
        showToast(gameState.timerActive ? "타이머가 일시 정지되었습니다." : "타이머를 재개합니다.");
      };

                          <button
                            onClick={handlePrevRound}
                            disabled={gameState.currentRound <= 1}
                            className="px-3 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-slate-800 disabled:opacity-30 text-slate-300 rounded-xl text-xs font-black"
                            title="이전 라운드로 롤백"
                          >
                            <ChevronLeftIcon />
                          </button>
                          <button
                            onClick={handleNextRound}
                            disabled={gameState.status !== 'revealed'}
                            className="flex-1 py-2.5 bg-gradient-to-r from-violet-600 to-violet-700 hover:from-violet-500 hover:to-violet-600 disabled:opacity-30 disabled:from-slate-800 disabled:to-slate-800 text-white rounded-xl text-xs font-black flex items-center justify-center space-x-1"
                          >
                            <span>{gameState.currentRound === 9 ? '종합 성적 발표' : '다음 라운드 진입'}</span>
                            <ChevronRightIcon />
                          </button>
                        </div>
                      </div>

                      {/* Chronograph monitors and diagnostics */}
                      <div className="bg-[#161D30] rounded-2xl p-4 border border-[#1E294D]/60 flex flex-col justify-between">
                        <div>
                          <span className="text-[8px] text-slate-400 uppercase tracking-widest font-black block mb-1">시간 통제 및 리셋</span>
                          <h4 className="text-xs font-black text-slate-300">타이머 보정 및 데이터 초기화</h4>
                        </div>
                        <div className="mt-4 flex items-center space-x-1.5">
                          <button
                            onClick={toggleTimerPause}
                            disabled={gameState.status !== 'submitting'}
                            className="px-2 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-[#1E294B] disabled:opacity-30 rounded-xl text-[10px] font-black text-slate-300"
                          >
                            {gameState.timerActive ? "일시정지" : "재개"}
                          </button>
                          <button
                            onClick={() => adjustTimer(30)}
                            disabled={gameState.status !== 'submitting'}
                            className="flex-1 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-[#1E294B] disabled:opacity-30 text-slate-300 rounded-xl text-[10px] font-black"
                          >
                            +30s
                          </button>
                          <button
                            onClick={() => adjustTimer(-30)}
                            disabled={gameState.status !== 'submitting'}
                            className="flex-1 py-2.5 bg-[#121829] border border-[#1E294D] hover:bg-[#1E294B] disabled:opacity-30 text-slate-300 rounded-xl text-[10px] font-black"
                          >
                            -30s
                          </button>
                          <button
                            onClick={handleResetGame}
                            className="px-2.5 py-2.5 bg-red-950/50 hover:bg-red-900 border border-red-800 text-red-400 rounded-xl text-[10px] font-black"
                            title="완전 초기화"
                          >
                            포맷
                          </button>
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* PC Dash panels */}
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    {/* LEFT PANEL: REALTIME MONITORING STREAM MATRIX */}
                    <div className="bg-[#121829] border border-[#1E294D] rounded-3xl p-6 shadow-xl lg:col-span-2">
                      <div className="flex items-center justify-between border-b border-[#1E294B]/50 pb-3.5 mb-4">
                        <div>
                          <span className="text-[8px] uppercase font-black tracking-widest text-indigo-400">Real-time Stream</span>
                          <h3 className="text-xs font-black text-white">그룹별 의사결정 수신 판독 현황</h3>
                        </div>
                        <span className="text-[10px] font-black text-indigo-300 bg-indigo-950/60 border border-indigo-500/20 px-2.5 py-1 rounded-lg">
                          🔑 세션 코드: {gameState.gameCode} (활성: {gameState.teams.length}개 팀)
                        </span>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                        {gameState.teams.map(team => {
                          const round = gameState.currentRound;
                          const hist = team.history[round];
                          const hasSubmitted = hist && hist.cards && hist.cards.length > 0;
                          
                          return (
                            <div 
                              key={team.id}
                              className={`p-4 rounded-2xl border transition-all ${
                                hasSubmitted 
                                  ? 'bg-[#151D33]/40 border-[#1F2E57]' 
                                  : gameState.status === 'submitting'
                                    ? 'bg-amber-950/15 border-amber-500/40 animate-pulse'
                                    : 'bg-[#0D1222]/60 border-[#1E294D]/60'
                              }`}
                            >
                              <div className="flex items-center justify-between mb-2.5">
                                <input
                                  type="text"
                                  value={team.name}
                                  onChange={(e) => handleUpdateTeamName(team.id, e.target.value)}
                                  className="text-xs font-black text-slate-200 bg-transparent border-b border-transparent hover:border-slate-600 focus:border-indigo-400 outline-none w-28"
                                  title="팀명 수정"
                                />
                                {hasSubmitted ? (
                                  <span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${
                                    hist.isAuto 
                                      ? 'bg-amber-950/80 text-amber-400 border border-amber-500/20' 
                                      : 'bg-emerald-950/80 text-emerald-400 border border-emerald-500/20'
                                  }`}>
                                    {hist.isAuto ? '자동 제출 완료' : '전술 전송 완료'}
                                  </span>
                                ) : (
                                  <span className="text-[9px] font-black text-slate-500 bg-[#161D30] px-2.5 py-0.5 rounded-full">
                                    {gameState.status === 'submitting' ? '전술 구성 중' : '대기 상태'}
                                  </span>
                                )}
                              </div>

                              <div className="flex items-center justify-between bg-[#0B0F19] border border-[#1E294D]/60 rounded-xl p-2">
                                {hasSubmitted ? (
                                  <>
                                    <div className="flex -space-x-1">
                                      {hist.cards.map((c, index) => (
                                        <div 
                                          key={index}
                                          className={`w-6 h-8 rounded text-[10px] font-black border flex items-center justify-center ${
                                            gameState.status === 'revealed' || gameState.status === 'closed'
                                              ? c.color === 'red' ? 'bg-red-950/80 text-red-400 border-red-500/30' : 'bg-slate-900 text-slate-100 border-slate-700'
                                              : 'bg-[#1F294D] text-slate-400 border-indigo-500/10'
                                          }`}
                                        >
                                          {gameState.status === 'revealed' || gameState.status === 'closed' ? c.value : '?'}
                                        </div>
                                      ))}
                                    </div>
                                    <span className="text-[9px] font-black text-slate-400">
                                      {gameState.status === 'revealed' || gameState.status === 'closed' ? (
                                        <span>결합 가치: <strong className="text-indigo-400">{hist.cards[0].value + hist.cards[1].value}</strong></span>
                                      ) : (
                                        <span className="text-indigo-400 flex items-center space-x-1">
                                          <span className="w-1 h-1 bg-indigo-400 rounded-full animate-ping"></span>
                                          <span>기밀 데이터 수신됨</span>
                                        </span>
                                      )}
                                    </span>
                                  </>
                                ) : (
                                  <span className="text-[9px] text-slate-500 py-1 font-semibold">의사결정 보강 대기</span>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* RIGHT PANEL: LEADERBOARD CHRONICLE */}
                    <div className="bg-[#121829] border border-[#1E294D] rounded-3xl p-6 shadow-xl">
                      <div className="flex items-center justify-between border-b border-[#1E294B]/50 pb-3.5 mb-4">
                        <div>
                          <span className="text-[8px] uppercase font-black tracking-widest text-indigo-400">Leaderboard</span>
                          <h3 className="text-xs font-black text-white">실시간 종합 순위표</h3>
                        </div>
                        <button
                          onClick={handleExportCSV}
                          className="p-1.5 text-slate-400 hover:text-white rounded-lg border border-[#1E294D] hover:bg-[#1E294B] transition-colors"
                          title="CSV 다운로드"
                        >
                          <DownloadIcon />
                        </button>
                      </div>

                      <div className="space-y-2.5 max-h-[350px] overflow-y-auto pr-1">
                        {[...gameState.teams]
                          .sort((a, b) => b.score - a.score)
                          .map((team, index) => {
                            const isTopRank = index === 0;
                            return (
                              <div 
                                key={team.id}
                                className={`flex items-center justify-between p-3 rounded-xl border transition-all ${
                                  isTopRank ? 'bg-indigo-950/20 border-indigo-500/30 shadow-indigo-950/20' : 'bg-[#0D1222]/50 border-[#1E294D]'
                                }`}
                              >
                                <div className="flex items-center space-x-3">
                                  <span className={`w-5.5 h-5.5 rounded-lg flex items-center justify-center font-mono text-[10px] font-black ${
                                    isTopRank ? 'bg-indigo-500/30 text-indigo-300' : 'bg-[#1E294B] text-slate-400'
                                  }`}>
                                    {index + 1}
                                  </span>
                                  <div>
                                    <span className="text-xs font-black text-slate-200">{team.name}</span>
                                    <span className="text-[8px] text-slate-500 block">잔여 카드: {team.deck.length}장</span>
                                  </div>
                                </div>
                                <div className="flex items-center space-x-2">
                                  <span className="font-mono text-xs font-black text-white">
                                    {team.score.toLocaleString()}P
                                  </span>
                                  
                                  <button
                                    onClick={() => {
                                      setEditingScoreTeamId(team.id);
                                      setEditScoreValue(team.history[gameState.currentRound]?.score || '0');
                                    }}
                                    className="p-1 text-slate-500 hover:text-slate-300 transition-colors"
                                    title="점수 조정"
                                  >
                                    <EditIcon />
                                  </button>
                                </div>
                              </div>
                            );
                          })}
                      </div>
                    </div>

                  </div>

                  {/* BOTTOM DESKTOP MATRIX SUMMARY RECORD TABLE */}
                  <div className="bg-[#121829] border border-[#1E294D] rounded-3xl p-6 shadow-xl overflow-x-auto">
                    <div className="border-b border-[#1E294B]/50 pb-3.5 mb-4">
                      <h3 className="text-xs font-black text-white">종합 시장 경영 성과 누계 리포트</h3>
                      <p className="text-[10px] text-slate-400 mt-1">참여 그룹 전체의 라운드별 선택 전술 카드 정보 및 실시간 손익 상태를 대조합니다.</p>
                    </div>

                    <table className="w-full text-left border-collapse min-w-[700px]">
                      <thead>
                        <tr className="border-b border-[#1E294D] text-[9px] uppercase font-black text-slate-500 tracking-wider">
                          <th className="py-2.5">그룹 프로필</th>
                          {Array.from({ length: 9 }).map((_, i) => (
                            <th key={i} className="py-2.5 text-center">R{i + 1}</th>
                          ))}
                          <th className="py-2.5 text-right">종합 누계</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-[#1E294D]/30 text-xs">
                        {gameState.teams.map(team => (
                          <tr key={team.id} className="hover:bg-[#151D33]/20">
                            <td className="py-3 font-black text-slate-200">{team.name}</td>
                            {Array.from({ length: 9 }).map((_, index) => {
                              const r = index + 1;
                              const h = team.history[r];
                              return (
                                <td key={index} className="py-3 text-center">
                                  {h ? (
                                    <div className="inline-flex flex-col items-center">
                                      <span className="font-mono text-[9px] font-bold text-slate-500">
                                        [{h.cards.map(c => c.value).join('+')}]
                                      </span>
                                      <span className={`text-[9px] font-black ${
                                        h.score > 0 ? 'text-emerald-400' : h.score < 0 ? 'text-red-400' : 'text-slate-400'
                                      }`}>
                                        {h.score > 0 ? `+${h.score}` : h.score}P
                                      </span>
                                    </div>
                                  ) : (
                                    <span className="text-slate-600 font-bold">-</span>
                                  )}
                                </td>
                              );
                            })}
                            <td className="py-3 font-mono font-black text-right text-indigo-400">
                              {team.score.toLocaleString()}P
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* SCORE RE-EDIT MODAL DIALOG */}
                  {editingScoreTeamId && (
                    <div className="fixed inset-0 bg-[#060810]/80 backdrop-blur-xs flex items-center justify-center z-50">
                      <div className="bg-[#121829] border border-[#1E294D] rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                        <h4 className="text-xs font-black text-white mb-1.5">임의 점수 가감 시스템 조율</h4>
                        <p className="text-[10px] text-slate-400 mb-4 leading-relaxed">
                          강사가 직접 해당 그룹의 성적 패널티 및 임의 가산 이익을 임의로 수치 고정 보정합니다.
                        </p>
                        <input
                          type="number"
                          value={editScoreValue}
                          onChange={(e) => setEditScoreValue(e.target.value)}
                          placeholder="변경 반영할 라운드 점수 입력"
                          className="w-full px-3.5 py-2.5 border border-[#1E294D] bg-[#0B0F19] text-white rounded-xl text-xs font-black outline-none focus:border-indigo-500 mb-4 text-center font-mono"
                        />
                        <div className="flex space-x-2">
                          <button
                            onClick={() => setEditingScoreTeamId(null)}
                            className="flex-1 py-2 bg-[#161D30] text-slate-400 rounded-xl text-xs font-black"
                          >
                            취소
                          </button>
                          <button
                            onClick={handleManualScoreEdit}
                            className="flex-1 py-2 bg-indigo-600 text-white rounded-xl text-xs font-black"
                          >
                            보정값 적용
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              )}

            </main>
          )}

          {/* FOOTER FOOTNOTES */}
          <footer className="border-t border-[#1E294B]/80 bg-[#0A0E1A] py-6 text-center text-[10px] text-slate-500 font-bold px-4">
            <p>© 2026 Market Simulation Game Engine. All Rights Reserved. Optimized for Enterprise Human Resources.</p>
            <p className="mt-1 opacity-75">SaaS Style Premium Navy Theme & Haptic Trigger Cards.</p>
          </footer>
          
        </div>
      );
    }

    // --- STREAMING_CHUNK: Bootstrapping React to DOM... ---
    // React 18 createRoot 마운트 작업 수행
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
